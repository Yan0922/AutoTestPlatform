version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: algotest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: algotest
      MYSQL_USER: algotest
      MYSQL_PASSWORD: algotestpass
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

  redis:
    image: redis:7-alpine
    container_name: algotest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: algotest-backend
    restart: unless-stopped
    depends_on: [db, redis]
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "please-change-me"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_ENGINE: "mysql"
      DB_NAME: "algotest"
      DB_USER: "algotest"
      DB_PASSWORD: "algotestpass"
      DB_HOST: "db"
      DB_PORT: "3306"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      CELERY_TASK_ALWAYS_EAGER: "1"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: algotest-frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "80:80"

volumes:
  mysql_data:
  media_data:
  static_data:
